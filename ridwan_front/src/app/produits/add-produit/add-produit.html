<div class="produit-form-page">
  <section class="form-header">
    <div>
      <h2>{{ isEdit ? 'Modifier un produit' : 'Nouveau produit' }}</h2>
      <p>Renseigne les informations du catalogue et du stock.</p>
    </div>
    <button type="button" class="btn btn-soft" (click)="retour.emit()">
      <i class="fa-solid fa-arrow-left"></i>
      Retour liste
    </button>
  </section>

  <form class="form-card" (ngSubmit)="ajouterProduit()">
    <div class="grid">
      <div class="field">
        <label>Code produit</label>
        <input
          type="text"
          [(ngModel)]="produit.code_produit"
          name="code_produit"
          placeholder="Ex: PRD-001"
          required />
      </div>

      <div class="field">
        <label>Nom du produit</label>
        <input
          type="text"
          [(ngModel)]="produit.produit"
          name="produit"
          placeholder="Nom commercial"
          required />
      </div>

      <div class="field">
        <label>Categorie</label>
        <input
          type="text"
          [(ngModel)]="produit.categorie"
          name="categorie"
          placeholder="Ex: Boissons"
          required />
      </div>

      <div class="field">
        <label>Prix unitaire (FCFA)</label>
        <input
          type="number"
          min="0"
          [(ngModel)]="produit.prix"
          name="prix"
          required />
      </div>

      <div class="field">
        <label>Quantite initiale</label>
        <input
          type="number"
          min="0"
          [(ngModel)]="produit.quantite"
          name="quantite"
          required />
      </div>
    </div>

    <div class="actions">
      <button type="button" class="btn btn-soft" (click)="retour.emit()">Annuler</button>
      <button type="submit" class="btn btn-primary" [disabled]="saving">
        <i class="fa-solid" [ngClass]="saving ? 'fa-spinner fa-spin' : 'fa-check'"></i>
        {{ saving ? 'Enregistrement...' : (isEdit ? 'Mettre a jour' : 'Ajouter produit') }}
      </button>
    </div>
  </form>
</div>
