<div class="ventes-page">
  <section class="header-card">
    <div>
      <h2>Historique des ventes</h2>
      <p>Consultation rapide des factures generees.</p>
    </div>
    <input
      type="text"
      [(ngModel)]="search"
      (input)="appliquerFiltres()"
      placeholder="Rechercher numero ou client" />
  </section>

  <div *ngIf="loading" class="loading">
    <i class="fa-solid fa-spinner fa-spin"></i>
    Chargement...
  </div>

  <section class="cards" *ngIf="!loading && facturesFiltrees.length">
    <article
      class="facture-card"
      *ngFor="let f of facturesFiltrees"
      (click)="voirFacture(f)">
      <div class="line">
        <span>Numero</span>
        <strong>{{ f.numero_facture }}</strong>
      </div>
      <div class="line">
        <span>Client</span>
        <strong>{{ f.client || 'Comptoir' }}</strong>
      </div>
      <div class="line">
        <span>Total</span>
        <strong class="amount">{{ f.total_prix | number }} FCFA</strong>
      </div>
    </article>
  </section>

  <div *ngIf="!loading && !facturesFiltrees.length" class="empty">
    Aucune facture disponible.
  </div>
</div>
